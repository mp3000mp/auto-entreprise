name: backend
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest

    env:
      DIRECTORY: ./backend

    steps:
      - name: Start MariaDB
        run: |
          docker run -d --name mariadb_test \
            -e MARIADB_ROOT_PASSWORD=secret \
            -e MARIADB_USER=user1 \
            -e MARIADB_PASSWORD=password1 \
            -e MARIADB_DATABASE=auto_entreprise_test \
            -p 3306:3306 \
            mariadb:11.4 \
            --innodb-use-native-aio=0
          echo "127.0.0.1 mariadb_test" | sudo tee -a /etc/hosts
          until docker exec mariadb_test mariadb-admin ping --silent; do sleep 2; done

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, mbstring, intl, pdo_sqlite, mysql
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        working-directory: ${{ env.DIRECTORY }}
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: PHP cs fixer
        working-directory: ${{ env.DIRECTORY }}
        run: composer csd

      - name: Warmup Symfony cache
        working-directory: ${{ env.DIRECTORY }}
        run: php bin/console cache:warmup --env=dev

      - name: PHPStan
        working-directory: ${{ env.DIRECTORY }}
        run: composer ps

      - name: Create database
        working-directory: ${{ env.DIRECTORY }}
        run: php bin/console doc:database:create --if-not-exists --no-interaction -e test
        env:
          DATABASE_URL: mysql://user1:password1@mariadb_test:3306/auto_entreprise_test?serverVersion=mariadb-11.4.0

      - name: Migrate database
        working-directory: ${{ env.DIRECTORY }}
        run: php bin/console doc:mig:mig --no-interaction -e test
        env:
          DATABASE_URL: mysql://user1:password1@mariadb_test:3306/auto_entreprise_test?serverVersion=mariadb-11.4.0

      - name: Exec tests
        working-directory: ${{ env.DIRECTORY }}
        run: composer tuci
        env:
          DATABASE_URL: mysql://user1:password1@mariadb_test:3306/auto_entreprise_test?serverVersion=mariadb-11.4.0

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ format('{0}/coverage.xml', env.DIRECTORY) }}
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
